# vesl-graft manifest — Phase 2 faithfulness shim.
#
# Mirrors the hardcoded blocks in vesl-nockup's
# tools/graft-inject/src/main.rs (BLOCK_IMPORTS / BLOCK_STATE /
# BLOCK_CAUSE / BLOCK_POKE / PEEK_REPLACEMENT).
#
# Two deltas from vesl-nockup's stale constants:
#   1. The gate signature here is the post-H-03
#      [note-id=@ data=* expected-root=@] form required by
#      vesl/protocol/lib/vesl-graft.hoon. vesl-nockup's hardcoded
#      constants still use the pre-H-03 [data=* expected-root=@]
#      form; they were aligned with this manifest in Phase 3 (loader).
#   2. The poke block carries a `%vesl-rotate-epoch` arm to match
#      the post-H-01 `vesl-cause` union. Without it the host kernel's
#      `?-` over `-.u.act` isn't exhaustive and hoonc aborts with
#      `mint-lost` / `-lost %vesl-rotate-epoch`. Caught when Phase 7b
#      first tried to compile a composed [vesl, mint] kernel.
#
# Renamed to settle-graft.toml in Phase 12A.

[graft]
name     = "vesl-graft"
version  = "0.1.0"
priority = 10
after    = []

[graft.blocks.imports]
sentinel = "*vesl-graft"
body     = """
/+  *vesl-graft
/+  *vesl-merkle"""

[graft.blocks.state]
sentinel = "vesl=vesl-state"
body     = "vesl=vesl-state"

[graft.blocks.cause]
sentinel = "vesl-cause"
body     = "vesl-cause"

[graft.blocks.poke]
sentinel = "%vesl-register"
body     = """
::
  %vesl-register
=/  lc=vesl-cause  [%vesl-register hull.u.act root.u.act]
=/  hash-gate=verify-gate
  |=  [note-id=@ data=* expected-root=@]
  ^-  ?
  =((hash-leaf ;;(@ data)) expected-root)
=/  [efx=(list vesl-effect) new-vesl=vesl-state]
  (vesl-poke vesl.state lc hash-gate)
:_  state(vesl new-vesl)
^-  (list effect)
efx
::
  %vesl-verify
=/  lc=vesl-cause  [%vesl-verify payload.u.act]
=/  hash-gate=verify-gate
  |=  [note-id=@ data=* expected-root=@]
  ^-  ?
  =((hash-leaf ;;(@ data)) expected-root)
=/  [efx=(list vesl-effect) new-vesl=vesl-state]
  (vesl-poke vesl.state lc hash-gate)
:_  state(vesl new-vesl)
^-  (list effect)
efx
::
  %vesl-settle
=/  lc=vesl-cause  [%vesl-settle payload.u.act]
=/  hash-gate=verify-gate
  |=  [note-id=@ data=* expected-root=@]
  ^-  ?
  =((hash-leaf ;;(@ data)) expected-root)
=/  [efx=(list vesl-effect) new-vesl=vesl-state]
  (vesl-poke vesl.state lc hash-gate)
:_  state(vesl new-vesl)
^-  (list effect)
efx
::
  %vesl-rotate-epoch
=/  lc=vesl-cause  [%vesl-rotate-epoch ~]
=/  hash-gate=verify-gate
  |=  [note-id=@ data=* expected-root=@]
  ^-  ?
  =((hash-leaf ;;(@ data)) expected-root)
=/  [efx=(list vesl-effect) new-vesl=vesl-state]
  (vesl-poke vesl.state lc hash-gate)
:_  state(vesl new-vesl)
^-  (list effect)
efx"""

[graft.blocks.peek]
sentinel = "vesl-peek"
body     = "(vesl-peek vesl.state path)"
